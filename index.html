<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>&#27839;&#21490;&#20154;&#29289;&#20253;</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>:root{--bg:#0d0b07;--gold:#c8a84b;--gold2:#e8c87a;--ink:#d4c9a8;--dim:#8a7a5a;--accent:#8b6914;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;color:var(--ink);font-family:"Noto Serif JP","Hiragino Mincho ProN",serif;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}.screen.active{display:flex;flex-direction:column;}
#screen-input{background:radial-gradient(ellipse at top,#1e1508,var(--bg));align-items:stretch;}
.s-header{text-align:center;padding:48px 20px 24px;}
.s-title{font-size:clamp(1.6rem,7vw,2.6rem);font-weight:700;letter-spacing:.25em;color:var(--gold);text-shadow:0 0 30px rgba(200,168,75,.5);animation:auraPulse 6s infinite;}
.s-sub{font-size:.72rem;letter-spacing:.6em;color:var(--dim);margin-top:6px;}
.input-card{margin:0 16px 40px;background:linear-gradient(160deg,#1a1508,#120f05);border:1px solid rgba(200,168,75,.18);border-radius:8px;padding:24px;box-shadow:0 12px 60px rgba(0,0,0,.8);}
.field-label{font-size:.65rem;letter-spacing:.45em;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.field-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(200,168,75,.4),transparent);}
.f-input{width:100%;padding:13px 14px;background:rgba(0,0,0,.55);color:var(--ink);border:1px solid rgba(200,168,75,.2);border-radius:6px;font-family:inherit;font-size:.9rem;outline:none;-webkit-appearance:none;transition:border-color .25s;}
.f-input:focus{border-color:rgba(200,168,75,.6);}
#apikey{font-family:monospace;font-size:.76rem;}
input::placeholder{color:rgba(138,122,90,.5);}
.hint{font-size:.63rem;color:var(--dim);margin-top:6px;line-height:1.7;letter-spacing:.03em;}
.divider{height:1px;background:rgba(200,168,75,.1);margin:18px 0;}
.gen-btn{width:100%;margin-top:20px;padding:16px;background:linear-gradient(135deg,#4a3000,#8b6914 50%,#4a3000);border:1px solid rgba(200,168,75,.5);border-radius:6px;color:var(--gold2);font-family:inherit;font-size:.95rem;font-weight:700;letter-spacing:.5em;cursor:pointer;-webkit-appearance:none;transition:opacity .2s;}
.gen-btn:active{opacity:.7;}.gen-btn:disabled{opacity:.35;cursor:not-allowed;}
#err-box{display:none;margin-top:14px;padding:12px;background:rgba(139,37,0,.3);border:1px solid rgba(200,80,50,.4);border-radius:6px;font-size:.73rem;color:#ffaa88;line-height:1.7;}
#gcp-warn-box{display:none;margin-top:8px;padding:10px 12px;background:rgba(150,100,0,.25);border:1px solid rgba(200,160,0,.4);border-radius:6px;font-size:.7rem;color:#ffd080;line-height:1.7;}
#screen-loading{background:rgba(5,4,2,.97);align-items:center;justify-content:center;padding:40px 20px;}
.loading-title{font-size:.9rem;letter-spacing:.6em;color:var(--gold);margin-bottom:8px;text-align:center;}
.loading-phase{font-size:.68rem;letter-spacing:.15em;color:var(--dim);margin-bottom:24px;min-height:2em;text-align:center;line-height:1.8;width:min(300px,88vw);}
.prog-wrap{width:min(280px,82vw);margin-bottom:8px;}
.prog-track{height:3px;background:rgba(200,168,75,.12);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;transition:width .5s ease;}
.prog-pct{text-align:right;font-size:.68rem;color:var(--gold);margin-top:5px;}
.stream-log{font-size:.6rem;color:rgba(138,122,90,.55);text-align:center;margin-top:6px;min-height:1em;letter-spacing:.05em;}
.step-list{display:flex;flex-direction:column;gap:8px;width:min(280px,82vw);margin-top:14px;}
.step-item{display:flex;align-items:center;gap:10px;font-size:.67rem;letter-spacing:.1em;transition:all .4s;}
.step-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:all .4s;}
#bg-note{display:none;margin-top:18px;padding:10px 14px;background:rgba(200,168,75,.06);border:1px solid rgba(200,168,75,.18);border-radius:6px;font-size:.62rem;color:var(--dim);text-align:center;line-height:1.9;width:min(280px,82vw);}
#screen-story{background:var(--bg);}
.story-card{margin:0 16px 40px;background:linear-gradient(160deg,#1a1508,#110e05);border:1px solid rgba(200,168,75,.12);border-radius:8px;padding:28px 24px;position:relative;overflow:hidden;}
.story-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,transparent,var(--gold),transparent);}
.story-person{font-size:1.4rem;font-weight:700;color:var(--gold2);letter-spacing:.3em;margin-bottom:4px;}
.story-era{font-size:.7rem;color:var(--dim);letter-spacing:.2em;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(200,168,75,.1);}
.story-body{font-size:.88rem;line-height:2.1;letter-spacing:.06em;color:var(--ink);white-space:pre-wrap;}
.action-row{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;}
.play-btn{flex:1;min-width:130px;padding:14px 10px;background:linear-gradient(135deg,#3a2000,#6b4a00);border:1px solid rgba(200,168,75,.4);border-radius:6px;color:var(--gold2);font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.3em;cursor:pointer;-webkit-appearance:none;}
.play-btn:active{opacity:.7;}
.sub-btn{padding:14px 14px;background:none;border:1px solid rgba(200,168,75,.2);border-radius:6px;color:var(--dim);font-family:inherit;font-size:.73rem;letter-spacing:.2em;cursor:pointer;-webkit-appearance:none;}
.sub-btn:active{opacity:.6;}
#screen-player{background:#000;display:none;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding-top:env(safe-area-inset-top);}
#screen-player.active{display:flex;}
.player-16x9{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#050402;flex-shrink:0;}
@media(orientation:portrait){.player-16x9{width:100vw;height:calc(100vw*9/16);}}
@media(orientation:landscape){.player-16x9{height:82vh;width:calc(82vh*16/9);max-width:100vw;}}
.player-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 25%,#1e1008,#050402 70%);transition:background 2.5s ease;}
#particle-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.player-meta{position:absolute;top:0;left:0;right:0;padding:clamp(6px,1.5vh,16px) clamp(14px,2.5vw,28px);display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(180deg,rgba(0,0,0,.72),transparent);z-index:2;}
.player-person-name{font-size:clamp(.5rem,.9vw,.8rem);color:var(--gold);letter-spacing:.3em;font-weight:700;text-shadow:0 0 16px rgba(200,168,75,.6);}
.player-chapter{font-size:clamp(.38rem,.65vw,.6rem);color:rgba(200,168,75,.65);letter-spacing:.2em;text-align:right;max-width:50%;}
.anim-zone{position:absolute;top:12%;left:0;right:0;bottom:38%;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:1;}
.anim-orb{width:clamp(70px,16vw,130px);height:clamp(70px,16vw,130px);border-radius:50%;background:radial-gradient(circle,rgba(200,168,75,.22),rgba(200,168,75,.06) 55%,transparent 100%);box-shadow:0 0 clamp(25px,6vw,60px) rgba(200,168,75,.3),0 0 clamp(50px,11vw,110px) rgba(200,168,75,.12);animation:orbBreath 4s ease-in-out infinite;position:relative;}
.anim-orb::before{content:'';position:absolute;inset:-12px;border-radius:50%;border:1px solid rgba(200,168,75,.25);animation:orbRing 4s ease-in-out infinite;}
.anim-orb::after{content:'';position:absolute;inset:-28px;border-radius:50%;border:1px solid rgba(200,168,75,.1);animation:orbRing 4s ease-in-out infinite .6s;}
@keyframes orbBreath{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(200,168,75,.28),0 0 80px rgba(200,168,75,.12);}50%{transform:scale(1.13);box-shadow:0 0 65px rgba(200,168,75,.45),0 0 130px rgba(200,168,75,.2);}}
@keyframes orbRing{0%,100%{transform:scale(1);opacity:.65;}50%{transform:scale(1.2);opacity:.12;}}
.subtitle-area{position:absolute;top:62%;left:0;right:0;bottom:2%;display:flex;align-items:center;justify-content:center;padding:0 clamp(12px,5vw,55px);background:linear-gradient(0deg,rgba(0,0,0,.6) 40%,transparent);z-index:2;}
.subtitle-text{font-size:clamp(.72rem,2.2vw,1.3rem);color:#f0e8d0;text-align:center;line-height:1.9;letter-spacing:.1em;text-shadow:0 0 30px rgba(200,168,75,.2),0 2px 16px rgba(0,0,0,.98);max-width:92%;transition:opacity .18s ease;}
.subtitle-text.fade{opacity:0;}
.player-ctrls{width:100%;background:#000;flex-shrink:0;padding:clamp(8px,1.5vh,16px) clamp(14px,3vw,28px);display:flex;flex-direction:column;gap:clamp(6px,1vh,12px);border-top:1px solid rgba(200,168,75,.08);}
.seq-info{display:flex;justify-content:space-between;font-size:clamp(.45rem,.6vw,.62rem);color:var(--dim);letter-spacing:.08em;}
.seq-track{width:100%;height:clamp(18px,2.5vh,26px);display:flex;align-items:center;position:relative;}
.seq-rail{position:absolute;left:0;right:0;height:3px;background:rgba(200,168,75,.12);border-radius:2px;}
.seq-fill{position:absolute;left:0;height:3px;width:0%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;}
.seq-handle{position:absolute;width:12px;height:12px;border-radius:50%;background:var(--gold2);box-shadow:0 0 8px var(--gold);transform:translateX(-50%);top:50%;margin-top:-6px;pointer-events:none;left:0%;}
.ctrl-btns{display:flex;align-items:center;justify-content:center;gap:clamp(16px,3vw,32px);}
.cb{background:none;font-family:inherit;cursor:pointer;-webkit-appearance:none;border:none;display:flex;align-items:center;justify-content:center;transition:opacity .15s;touch-action:manipulation;color:var(--gold);}
.cb:active{opacity:.45;}
.btn-play{width:clamp(48px,7vw,64px);height:clamp(48px,7vw,64px);border-radius:50%;background:linear-gradient(145deg,#3a2000,#6b4a00);border:2px solid rgba(200,168,75,.6);color:var(--gold2);font-size:clamp(1.1rem,2vw,1.4rem);box-shadow:0 0 20px rgba(200,168,75,.25);}
.btn-end{font-size:clamp(.5rem,.7vw,.65rem);letter-spacing:.2em;color:rgba(200,150,80,.7);border:1px solid rgba(139,105,20,.4);border-radius:4px;padding:clamp(6px,1vh,10px) clamp(10px,1.5vw,18px);}
.tts-overlay{position:absolute;inset:0;background:rgba(5,4,2,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;}
.tts-overlay-text{font-size:clamp(.65rem,1.2vw,.85rem);color:var(--gold);letter-spacing:.3em;}
.tts-pb{width:clamp(120px,30vw,220px);height:3px;background:rgba(200,168,75,.1);border-radius:2px;}
.tts-pf{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;transition:width .3s ease;}
@keyframes auraPulse{0%,100%{text-shadow:0 0 30px rgba(200,168,75,.5);}50%{text-shadow:0 0 55px rgba(200,168,75,.85),0 0 100px rgba(200,168,75,.3);}}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(200,168,75,.2);border-radius:2px;}</style>
</head>

/* ══ パース（よみがな不要版） ══ */
function parseStory(raw){
  var lines=raw.split('\n');
  var personD='',personS='',era='',dL=[],mode='display';
  lines.forEach(function(line){
    var s=line.trim();
    if(/^\u4eba\u7269[:\uff1a]/.test(s)){personD=s.replace(/^\u4eba\u7269[:\uff1a]/,'').trim();}
    else if(/^\u3088\u307f[:\uff1a]/.test(s)&&mode==='display'){personS=s.replace(/^\u3088\u307f[:\uff1a]/,'').trim();}
    else if(/^\u6642\u4ee3[:\uff1a]/.test(s)){era=s.replace(/^\u6642\u4ee3[:\uff1a]/,'').trim();}
    else if(mode==='display'){dL.push(s);}
  });
  var dp=dL.join('\n').split(/\n{2,}/).map(function(p){return p.trim();}).filter(Boolean);
  return {personDisplay:personD,personSpeech:personS||personD,era:era,displayParas:dp};
}

/* ══ 字幕キュー（表示テキストのみ） ══ */
var subtitleCues=[],cueAbsTimes=[];
var speechFull='',speechTotalChars=0;

function buildSubtitleCues(dp){
  var cues=[];
  for(var i=0;i<dp.length;i++){
    var d=dp[i];
    var cm=d.match(/^\u3010(.+?)\u3011/);
    if(cm){cues.push({displayText:d,isChapter:true,chapterName:cm[1]});continue;}
    var sents=d.split(/(?<=[。！？…]+)/).map(function(x){return x.trim();}).filter(Boolean);
    for(var j=0;j<sents.length;j++){
      cues.push({displayText:sents[j],isChapter:false,chapterName:''});
    }
  }
  return cues;
}

/* ══ SSML構築（SSMLマーク付き・完全同期） ══
   enableTimePointing:["SSML_MARK"] でGoogle TTS APIが
   各マークの正確な再生時刻を返す → 補間不要・完璧な字幕同期
═══════════════════════════════════════════════════════════════ */
function cueToTTSText(cue){
  var t=cue.displayText;
  if(cue.isChapter){
    t=t.replace(/^\u3010(.+?)\u3011$/,function(_,inner){
      return inner.replace(/\uff1a/,'\u3001')+'\u3002';
    });
  }
  return t;
}
function escXML(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
/* ダッシュ(―)→500ms休止 */
function ttsToSSML(text){
  return text.split('\u2015').map(escXML).join('<break time="500ms"/>');
}
function buildSSMLChunks(cues){
  var MAX=600,chunks=[],cur=[],curLen=0;
  for(var i=0;i<cues.length;i++){
    var tts=cueToTTSText(cues[i]);
    if(curLen+tts.length>MAX&&cur.length>0){chunks.push(cur.slice());cur=[];curLen=0;}
    cur.push(i);curLen+=tts.length;
  }
  if(cur.length>0)chunks.push(cur);
  return chunks;
}
function buildSSMLForChunk(cues,indices){
  var s='<speak>';
  for(var k=0;k<indices.length;k++){
    var i=indices[k];
    s+='<mark name="c'+i+'"/>'+ttsToSSML(cueToTTSText(cues[i]));
  }
  return s+'</speak>';
}

      })
    });
    if(!res.ok){var errData=await res.json().catch(function(){return{};});throw new Error(errData.error&&errData.error.message||'API\u30a8\u30e9\u30fc status '+res.status);}
    var reader=res.body.getReader(),decoder=new TextDecoder(),buf='',cc=0;
    while(true){
      var result=await reader.read();if(result.done)break;
      buf+=decoder.decode(result.value,{stream:true});
      var ls=buf.split('\n');buf=ls.pop();
      for(var li=0;li<ls.length;li++){
        var line=ls[li].trim();
        if(!line.startsWith('data:'))continue;
        var js=line.slice(5).trim();if(js==='[DONE]')continue;
        try{var evt=JSON.parse(js);
          if(evt.type==='content_block_delta'&&evt.delta&&evt.delta.type==='text_delta'){
            var ch=evt.delta.text||'';fullText+=ch;cc+=ch.length;
            var pct=Math.min(99,Math.round(cc/ESTIMATED_MAX*100));
            updateBar(pct);
            document.getElementById('stream-log').textContent=cc.toLocaleString()+'\u6587\u5b57\u751f\u6210\u4e2d'+(pct>=99?'\uff08\u4ed5\u4e0a\u3052\u4e2d\u2026\uff09':'...');
          }
        }catch(e){}
      }
    }
    if(!fullText)throw new Error('\u751f\u6210\u3055\u308c\u305f\u30c6\u30ad\u30b9\u30c8\u304c\u7a7a\u3067\u3059');
    document.getElementById('stream-log').textContent='';
    var parsed=parseStory(fullText);
    if(!parsed.personDisplay)throw new Error('\u4eba\u7269\u540d\u306e\u53d6\u5f97\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002\u518d\u5ea6\u304a\u8a66\u3057\u304f\u3060\u3055\u3044\u3002');
    if(!parsed.displayParas.length)throw new Error('\u672c\u6587\u306e\u53d6\u5f97\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002\u518d\u5ea6\u304a\u8a66\u3057\u304f\u3060\u3055\u3044\u3002');
    savedPersonDisplay=parsed.personDisplay;
    savedEra=parsed.era;
    savedDisplayFull=parsed.displayParas.join('\n\n');
    subtitleCues=buildSubtitleCues(parsed.displayParas);
    speechFull=parsed.displayParas.join('\n');
    speechTotalChars=speechFull.length;
    finishBar();
    setTimeout(function(){
      document.getElementById('story-person').textContent=savedPersonDisplay;
      document.getElementById('story-era').textContent=savedEra;
      document.getElementById('story-body').textContent=savedDisplayFull;
      document.getElementById('gen-btn').disabled=false;
      showScreen('screen-story');
    },600);
  }catch(err){
    document.getElementById('bg-note').style.display='none';
    setTimeout(function(){
      document.getElementById('gen-btn').disabled=false;
      showScreen('screen-input');
      var eb=document.getElementById('err-box');
      eb.textContent='\u26a0 \u30a8\u30e9\u30fc\uff1a'+err.message;
      eb.style.display='block';
    },400);
  }
}

/* ══ プレイヤー状態 ══ */
var isPlaying=false,isPaused=false,rafId=null;
var ttsAudio=null;
var audioChunks=[],chunkStartTimes=[],totalDuration=0,currentChunkIdx=0;

/* ══ 字幕タイム検索（完全同期） ══ */
function getCueByAbsSec(absSec){
  var best=0;
  for(var i=0;i<cueAbsTimes.length;i++){
    if(cueAbsTimes[i]<=absSec)best=i;else break;
  }
  return best;
}

/* ══ GCP TTS（SSML marks + enableTimePointing） ══ */
async function synthesizeSSMLChunk(apiKey,ssml){
  var res=await fetch('https://texttospeech.googleapis.com/v1beta1/text:synthesize?key='+apiKey,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      input:{ssml:ssml},
      voice:{languageCode:'ja-JP',name:'ja-JP-Neural2-C'},
      audioConfig:{audioEncoding:'MP3',speakingRate:0.83,pitch:-3.5},
      enableTimePointing:['SSML_MARK']
    })
  });
  if(!res.ok){
    var e=await res.json().catch(function(){return{};});
    var msg=(e.error&&e.error.message)||'GCP TTS error '+res.status;
    if(res.status===403||msg.indexOf('invalid')>=0)
      msg+='\n\u2192 API\u30ad\u30fc\u304c\u7121\u52b9\u3067\u3059\u3002Google\u30b3\u30f3\u30bd\u30fc\u30eb\u3067\u518d\u78ba\u8a8d\u3057\u3066\u304f\u3060\u3055\u3044\u3002';
    else if(msg.indexOf('disabled')>=0||msg.indexOf('enable')>=0||msg.indexOf('not been used')>=0)
      msg+='\n\u2192 Cloud Text-to-Speech API\u304c\u6709\u52b9\u306b\u306a\u3063\u3066\u3044\u307e\u305b\u3093\u3002\nconsole.cloud.google.com \u2192 \u30e9\u30a4\u30d6\u30e9\u30ea \u2192 Text-to-Speech API \u2192 \u6709\u52b9\u306b\u3059\u308b';
    throw new Error(msg);
  }
  var data=await res.json();
  var bin=atob(data.audioContent),arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return {blob:new Blob([arr],{type:'audio/mpeg'}),timepoints:data.timepoints||[]};
}
function getAudioDuration(blob){
  return new Promise(function(resolve,reject){
    var url=URL.createObjectURL(blob);
    var a=new Audio();
    a.onloadedmetadata=function(){URL.revokeObjectURL(url);resolve(a.duration);};
    a.onerror=function(){URL.revokeObjectURL(url);reject(new Error('duration\u53d6\u5f97\u5931\u6557'));};
    a.src=url;
  });
}

/* ══ UI ══ */
function showSubtitle(text){var el=document.getElementById('subtitle-text');el.classList.add('fade');setTimeout(function(){el.textContent=text||'\u3000';el.classList.remove('fade');},180);}
function updateSeqUI(pct,tl){var p=Math.round(Math.min(100,Math.max(0,pct||0)));document.getElementById('seq-fill').style.width=p+'%';document.getElementById('seq-handle').style.left=p+'%';document.getElementById('seq-label').textContent=p+'%';if(tl!==undefined)document.getElementById('time-label').textContent=tl;}
function fmtTime(c,t){function f(n){return Math.floor(n/60)+':'+String(Math.floor(n%60)).padStart(2,'0');}return f(Math.min(c,t))+' / '+f(t);}
function updatePlayBtn(){document.getElementById('btn-play').textContent=isPaused?'\u25b6':'\u23f8';}
function stopAll(){isPlaying=false;isPaused=false;cancelAnimationFrame(rafId);if(ttsAudio){ttsAudio.onended=null;ttsAudio.pause();ttsAudio.src='';ttsAudio=null;}}

/* ══ チャンク再生 ══ */
function playChunkAt(chunkIdx){
  if(!isPlaying||chunkIdx>=audioChunks.length){
    isPlaying=false;isPaused=false;cancelAnimationFrame(rafId);
    showSubtitle('\u2015 \u8a9e\u308a\u7d42\u308f\u308a\u307e\u3057\u305f \u2015');
    updateSeqUI(100,fmtTime(totalDuration,totalDuration));
    stopBGM();stopParticles();
    setTimeout(function(){showScreen('screen-story');},4000);
    return;
  }
  currentChunkIdx=chunkIdx;
  var chunk=audioChunks[chunkIdx];
  var chunkStart=chunkStartTimes[chunkIdx];
  var url=URL.createObjectURL(chunk.blob);
  ttsAudio=new Audio(url);
  var lastCue=-1;
  ttsAudio.onended=function(){URL.revokeObjectURL(url);if(!isPlaying)return;playChunkAt(chunkIdx+1);};
  ttsAudio.play().catch(function(e){console.warn('[play]',e);});
  cancelAnimationFrame(rafId);
  function tick(){
    if(!isPlaying||isPaused)return;
    var absSec=chunkStart+ttsAudio.currentTime;
    updateSeqUI((absSec/totalDuration)*100,fmtTime(absSec,totalDuration));
    var ci=getCueByAbsSec(absSec);
    if(ci!==lastCue){lastCue=ci;showSubtitle(subtitleCues[ci].displayText);updateChapter(ci);}
    rafId=requestAnimationFrame(tick);
  }
  rafId=requestAnimationFrame(tick);
}

/* ══ プレイヤー起動 ══ */
async function startPlayer(){
  if(!speechFull){alert('\u5148\u306b\u4eba\u7269\u306e\u751f\u6daf\u3092\u751f\u6210\u3057\u3066\u304f\u3060\u3055\u3044');return;}
  var gcpKey=document.getElementById('gcp-key').value.trim();
  if(!gcpKey){alert('Google Cloud TTS\u30ad\u30fc\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044');return;}
  if(!checkGcpBudget(speechTotalChars))return;
  stopAll();stopParticles();isPaused=false;
  document.getElementById('player-name').textContent=savedPersonDisplay;
  document.getElementById('player-chapter').textContent='';
  document.getElementById('time-label').textContent='0:00 / --:--';
  setChapterBg(0);updatePlayBtn();updateSeqUI(0);
  showScreen('screen-player');
  setTimeout(initParticles,80);
  startBGM();
  var overlay=document.getElementById('tts-overlay');
  var pfill=document.getElementById('tts-pfill');
  var ovtext=document.getElementById('tts-overlay-text');
  overlay.style.display='flex';pfill.style.width='0%';
  /* SSMLチャンク構築 */
  var ssmlChunkDefs=buildSSMLChunks(subtitleCues);
  audioChunks=[];chunkStartTimes=[];totalDuration=0;
  cueAbsTimes=new Array(subtitleCues.length).fill(-1);
  for(var ci=0;ci<ssmlChunkDefs.length;ci++){
    ovtext.textContent='\u97f3\u58f0\u3092\u751f\u6210\u4e2d\u2026 ('+(ci+1)+'/'+ssmlChunkDefs.length+')';
    pfill.style.width=Math.round((ci/ssmlChunkDefs.length)*100)+'%';
    var ssml=buildSSMLForChunk(subtitleCues,ssmlChunkDefs[ci]);
    try{
      var result=await synthesizeSSMLChunk(gcpKey,ssml);
      var dur=await getAudioDuration(result.blob);
      /* タイムポイントからキュー時刻を設定（完全同期） */
      var chunkOffset=totalDuration;
      result.timepoints.forEach(function(tp){
        var idx=parseInt(tp.markName.slice(1),10);
        if(!isNaN(idx))cueAbsTimes[idx]=chunkOffset+tp.timeSeconds;
      });
      audioChunks.push({blob:result.blob,duration:dur});
      chunkStartTimes.push(totalDuration);
      totalDuration+=dur;
    }catch(e){
      overlay.style.display='none';
      alert('\u26a0 \u97f3\u58f0\u751f\u6210\u30a8\u30e9\u30fc\n'+e.message);
      stopAll();stopBGM();stopParticles();showScreen('screen-story');
      return;
    }
  }
  /* タイムポイントが取得できなかったキューを線形補間でフォールバック */
  for(var i=0;i<cueAbsTimes.length;i++){
    if(cueAbsTimes[i]<0){
      var prev=i>0?cueAbsTimes[i-1]:0;
      var next=-1;
      for(var j=i+1;j<cueAbsTimes.length;j++){if(cueAbsTimes[j]>=0){next=cueAbsTimes[j];break;}}
      cueAbsTimes[i]=next>=0?(prev+next)/2:prev+0.5;
    }
  }
  saveUsage(speechTotalChars);updateUsageHint();
  pfill.style.width='100%';
  ovtext.textContent='\u518d\u751f\u3092\u958b\u59cb\u3057\u307e\u3059\u2026';
  await new Promise(function(r){setTimeout(r,400);});
  overlay.style.display='none';
  isPlaying=true;
  showSubtitle(subtitleCues[0]&&subtitleCues[0].displayText||'');
  updateChapter(0);
  playChunkAt(0);
}

/* ══ 一時停止・再開 ══ */
function togglePause(){
  if(isPaused){
    isPaused=false;updatePlayBtn();isPlaying=true;
    if(ttsAudio){
      ttsAudio.play();
      var cs=chunkStartTimes[currentChunkIdx]||0;var lastCue=-1;
      function tickR(){
        if(!isPlaying||isPaused)return;
        var abs=cs+ttsAudio.currentTime;
        updateSeqUI((abs/totalDuration)*100,fmtTime(abs,totalDuration));
        var ci=getCueByAbsSec(abs);
        if(ci!==lastCue){lastCue=ci;showSubtitle(subtitleCues[ci].displayText);updateChapter(ci);}
        rafId=requestAnimationFrame(tickR);
      }
      rafId=requestAnimationFrame(tickR);
    }
  }else{
    isPaused=true;updatePlayBtn();cancelAnimationFrame(rafId);
    if(ttsAudio){ttsAudio.pause();isPlaying=true;}
  }
}
function stopPlayer(){stopAll();stopBGM();stopParticles();showScreen('screen-story');}

/* ══ コピー ══ */
function copyStory(){
  var text=savedPersonDisplay+(savedEra?'\n'+savedEra:'')+'\n\n'+savedDisplayFull;
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){alert('\u30b3\u30d4\u30fc\u3057\u307e\u3057\u305f\uff01');}).catch(function(){fbCopy(text);});}
  else fbCopy(text);
}
function fbCopy(text){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('\u30b3\u30d4\u30fc\u3057\u307e\u3057\u305f\uff01');}

/* ══ 初期化 ══ */
document.addEventListener('visibilitychange',function(){
  if(!document.hidden||!isPlaying||isPaused)return;
  isPaused=true;updatePlayBtn();cancelAnimationFrame(rafId);
  if(ttsAudio)ttsAudio.pause();isPlaying=true;
});
window.addEventListener('pagehide',function(){stopAll();});
window.addEventListener('beforeunload',function(){stopAll();});
</script>
